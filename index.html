<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IRR测算 · 税法知识库 · 税务AI助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #e9f0fc 0%, #d9e2f2 100%);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 32px 24px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }
        .left-col {
            flex: 1.2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .right-content {
            flex: 2;
            min-width: 300px;
        }
        .card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 24px 22px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eef2fa;
            padding-bottom: 12px;
        }
        .card-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1f2f5c, #2c4b8c);
            background-clip: text;
            color: transparent;
        }
        .param-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .param-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8fafd;
            padding: 6px 16px;
            border-radius: 60px;
            border: 1px solid #e2eaf5;
        }
        .param-group label { font-weight: 500; color: #1e2f47; }
        .param-group input {
            border: none;
            background: transparent;
            padding: 8px 0;
            width: 110px;
            outline: none;
        }
        .btn {
            background: #2c5f8a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: linear-gradient(105deg, #2b5f8a, #1f4980); }
        .btn-primary:hover { transform: translateY(-2px); background: linear-gradient(105deg, #236d9c, #1b3f6e); }
        .btn-calc { background: linear-gradient(105deg, #2b7a4b, #1d5e3a); padding: 10px 24px; }
        .year-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
        .year-card {
            background: #ffffffdd;
            border-radius: 24px;
            padding: 10px 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        .year-label {
            font-weight: 700;
            background: #eef3fc;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            min-width: 65px;
            text-align: center;
        }
        .input-group-sm {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #fafcff;
            border: 1px solid #e2edf9;
            border-radius: 32px;
            padding: 4px 10px;
        }
        .input-group-sm span { font-size: 0.7rem; color: #5b6f8c; }
        .input-group-sm input {
            width: 75px;
            border: none;
            background: transparent;
            padding: 5px 0;
            outline: none;
        }
        .result-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: #1e2f41;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 60px;
            color: #c9f0ff;
            margin-top: 10px;
        }
        .policy-card {
            background: #f8fafd;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 14px;
            border-left: 5px solid #2c7da0;
        }
        .small-btn {
            background: #e2eaf5;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 6px;
        }
        .glass-chat {
            background: rgba(170,210,170,0.2);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(180,210,160,0.4);
            padding: 20px;
        }
        .chat-messages {
            height: 320px;
            overflow-y: auto;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            padding: 8px 14px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 0.85rem;
        }
        .message.user {
            background: rgba(100,150,100,0.85);
            color: white;
            align-self: flex-end;
        }
        .message.assistant {
            background: rgba(220,245,220,0.9);
            color: #2c5a2c;
            align-self: flex-start;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .chat-input-area input {
            flex: 1;
            border-radius: 40px;
            border: 1px solid #c0d8c0;
            padding: 10px 16px;
            background: white;
        }
        .lead-field-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .lead-field-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #cbddea;
            background: white;
        }
        @media (max-width: 900px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 左侧：AI聊天 + 获客表单 -->
    <div class="left-col">
        <!-- AI 聊天窗口（保留前端直接调用大模型 API，也可改成后端代理，保持简单） -->
        <div class="glass-chat">
            <div style="font-weight:700; margin-bottom:12px;">🌿 税务AI助手</div>
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">您好！请随时提问税务问题～</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="输入问题...">
                <button id="sendChatBtn" class="btn">发送</button>
            </div>
            <div class="api-settings" style="text-align:center; margin-top:8px; font-size:0.7rem;">
                <span id="apiKeyStatus">⚙️ 未配置API密钥，使用演示模式</span>
                <button id="configApiBtn" style="background:none; border:none; color:#2c5f8a; text-decoration:underline; cursor:pointer;">配置</button>
            </div>
        </div>
        <!-- 获客卡片 -->
        <div class="card">
            <div class="card-header"><span>🎯</span><h3>免费税务筹划诊断</h3></div>
            <div class="lead-field-row"><input type="text" id="leadName" placeholder="姓名 *"></div>
            <div class="lead-field-row"><input type="text" id="leadCompany" placeholder="公司 *"></div>
            <div class="lead-field-row"><input type="tel" id="leadPhone" placeholder="手机 *"></div>
            <div style="display:flex; gap:12px; justify-content:flex-end;">
                <button id="submitLeadBtn" class="btn btn-primary">提交</button>
                <button id="resetLeadBtn" class="btn">重置</button>
            </div>
            <div id="leadMsg" style="margin-top:10px; font-size:0.8rem;"></div>
            <div class="wechat-row" style="margin-top:16px; background:#fef7e0; border-radius:28px; padding:10px 16px; display:flex; justify-content:space-between;">
                <span>🤝 专家微信 N1308635859</span>
                <button id="copyWechatBtn" style="background:#e9b35f; border:none; border-radius:30px; padding:4px 12px;">复制</button>
            </div>
        </div>
    </div>

    <!-- 右侧内容 -->
    <div class="right-content">
        <!-- IRR 测算 -->
        <div class="card">
            <div class="card-header"><span>📊</span><h3>IRR测算（政策驱动）</h3></div>
            <div class="param-row">
                <div class="param-group"><label>初始投资</label><input type="number" id="initialInv" value="1000" step="0.01"></div>
                <div class="param-group"><label>项目年限</label><input type="number" id="yearsCount" value="3" min="1" step="1"></div>
                <button id="generateYearsBtn" class="btn btn-primary">生成年份表</button>
            </div>
            <div id="yearsContainer"></div>
            <button id="calcIrrBtn" class="btn btn-calc" style="margin-top:16px;">计算 IRR</button>
            <div id="irrResult" style="margin-top:20px; text-align:center;"></div>
        </div>

        <!-- 通用税法知识库（静态，不涉及后端） -->
        <div class="card">
            <div class="card-header"><span>📜</span><h3>通用税法知识库</h3></div>
            <div id="generalPolicies"></div>
        </div>
        <!-- 行业税法知识库（静态） -->
        <div class="card">
            <div class="card-header"><span>🏭</span><h3>行业税法知识库</h3></div>
            <div class="industry-tabs" id="industryTabs">
                <button class="industry-tab active" data-industry="software">软件</button>
                <button class="industry-tab" data-industry="manufacturing">制造</button>
                <button class="industry-tab" data-industry="newenergy">新能源</button>
            </div>
            <div id="industryPolicies"></div>
        </div>
    </div>
</div>

<script>
    // ========== 后端 API 地址（请根据实际部署修改） ==========
    const API_BASE = 'http://localhost:3000/api';  // 后端服务地址

    // ========== 通用/行业政策数据（静态，不需要后端，但可独立维护） ==========
    const generalPolicies = [
        { title: "增值税基本税率", desc: "一般纳税人销售货物、劳务，税率13%。", link: "https://www.chinatax.gov.cn/" },
        { title: "企业所得税标准税率", desc: "居民企业25%，高新企业15%。", link: "https://www.chinatax.gov.cn/" },
        { title: "研发费用加计扣除", desc: "研发费用可在税前加计100%扣除。", link: "#" }
    ];
    const industryPoliciesMap = {
        software: [
            { title: "软件企业增值税即征即退", desc: "税负超3%即征即退", link: "#" },
            { title: "软件企业所得税两免三减半", desc: "获利年度起两年免征、三年减半", link: "#" }
        ],
        manufacturing: [
            { title: "制造业留抵退税", desc: "按月全额退还增量留抵税额", link: "#" },
            { title: "固定资产加速折旧", desc: "可缩短折旧年限", link: "#" }
        ],
        newenergy: [
            { title: "新能源增值税即征即退50%", desc: "光伏、风电即征即退50%", link: "#" },
            { title: "企业所得税三免三减半", desc: "项目取得第一笔收入起前三年免征，后三年减半", link: "#" }
        ]
    };
    let currentIndustry = 'software';
    function renderGeneralPolicies() {
        const container = document.getElementById('generalPolicies');
        container.innerHTML = '';
        generalPolicies.forEach(p => {
            const div = document.createElement('div'); div.className = 'policy-card';
            div.innerHTML = `<div style="font-weight:700;">📌 ${p.title}</div><div style="font-size:0.8rem;">${p.desc}</div><a href="${p.link}" target="_blank">详情</a>`;
            container.appendChild(div);
        });
    }
    function renderIndustryPolicies() {
        const container = document.getElementById('industryPolicies');
        container.innerHTML = '';
        industryPoliciesMap[currentIndustry].forEach(p => {
            const div = document.createElement('div'); div.className = 'policy-card';
            div.innerHTML = `<div style="font-weight:700;">📌 ${p.title}</div><div style="font-size:0.8rem;">${p.desc}</div><a href="${p.link}" target="_blank">详情</a><div><button class="small-btn" onclick="alert('应用到测算功能暂未接入后端，可通过手动修改参数')">应用到测算</button></div>`;
            container.appendChild(div);
        });
    }
    document.querySelectorAll('.industry-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.industry-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentIndustry = tab.dataset.industry;
            renderIndustryPolicies();
        });
    });

    // ========== IRR 前端动态生成年份输入框 ==========
    let yearlyData = [];  // 存储当前年份输入框的值
    function generateYearRows() {
        const years = parseInt(document.getElementById('yearsCount').value) || 1;
        const container = document.getElementById('yearsContainer');
        container.innerHTML = '';
        yearlyData = [];
        for (let i = 0; i < years; i++) {
            const yearDiv = document.createElement('div');
            yearDiv.className = 'year-card';
            yearDiv.innerHTML = `
                <div class="year-label">第 ${i+1} 年</div>
                <div class="input-group-sm"><span>营收</span><input type="number" step="0.01" class="rev"></div>
                <div class="input-group-sm"><span>付现成本</span><input type="number" step="0.01" class="cost"></div>
                <div class="input-group-sm"><span>利息</span><input type="number" step="0.01" class="int"></div>
                <div class="input-group-sm"><span>折旧</span><input type="number" step="0.01" class="dep"></div>
                <div class="input-group-sm"><span>研发费用</span><input type="number" step="0.01" class="rd"></div>
                <div class="input-group-sm"><span>税率(%)</span><input type="number" step="0.1" class="taxrate" value="25"></div>
            `;
            container.appendChild(yearDiv);
            // 存储输入框引用
            yearlyData.push({
                rev: yearDiv.querySelector('.rev'),
                cost: yearDiv.querySelector('.cost'),
                int: yearDiv.querySelector('.int'),
                dep: yearDiv.querySelector('.dep'),
                rd: yearDiv.querySelector('.rd'),
                taxrate: yearDiv.querySelector('.taxrate')
            });
        }
    }
    document.getElementById('generateYearsBtn').addEventListener('click', generateYearRows);
    generateYearRows();  // 初始生成

    // ========== 调用后端 IRR 计算 API ==========
    async function calculateIRR() {
        const inv = parseFloat(document.getElementById('initialInv').value);
        const years = yearlyData.length;
        const cashflowData = [];
        for (let i = 0; i < years; i++) {
            cashflowData.push({
                revenue: parseFloat(yearlyData[i].rev.value) || 0,
                cost: parseFloat(yearlyData[i].cost.value) || 0,
                interest: parseFloat(yearlyData[i].int.value) || 0,
                depreciation: parseFloat(yearlyData[i].dep.value) || 0,
                rd: parseFloat(yearlyData[i].rd.value) || 0,
                taxRate: parseFloat(yearlyData[i].taxrate.value) || 0
            });
        }
        try {
            const response = await fetch(`${API_BASE}/calculate-irr`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initialInvestment: inv, yearlyData: cashflowData })
            });
            const result = await response.json();
            if (result.success) {
                document.getElementById('irrResult').innerHTML = `
                    <div style="display:flex; justify-content:center; gap:20px;">
                        <div><span>税后 IRR</span><div class="result-value">${(result.irrAfter * 100).toFixed(4)}%</div></div>
                        <div><span>税前 IRR</span><div class="result-value">${(result.irrBefore * 100).toFixed(4)}%</div></div>
                    </div>
                    <div style="font-size:0.7rem;">税后已考虑研发加计扣除100%</div>
                `;
            } else {
                alert('计算失败：' + result.message);
            }
        } catch (err) {
            alert('后端服务不可用，请确保后端已启动');
        }
    }
    document.getElementById('calcIrrBtn').addEventListener('click', calculateIRR);

    // ========== 获客资料提交到后端 ==========
    async function submitLead() {
        const name = document.getElementById('leadName').value.trim();
        const company = document.getElementById('leadCompany').value.trim();
        const phone = document.getElementById('leadPhone').value.trim();
        if (!name || !company || !phone) {
            alert('请填写完整信息');
            return;
        }
        try {
            const response = await fetch(`${API_BASE}/submit-lead`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, company, phone })
            });
            const result = await response.json();
            if (result.success) {
                document.getElementById('leadMsg').innerText = '✅ 提交成功，专家将尽快联系您！';
                document.getElementById('leadName').value = '';
                document.getElementById('leadCompany').value = '';
                document.getElementById('leadPhone').value = '';
                setTimeout(() => document.getElementById('leadMsg').innerText = '', 3000);
            } else {
                alert('提交失败：' + result.message);
            }
        } catch (err) {
            alert('后端服务不可用');
        }
    }
    document.getElementById('submitLeadBtn').addEventListener('click', submitLead);
    document.getElementById('resetLeadBtn').addEventListener('click', () => {
        document.getElementById('leadName').value = '';
        document.getElementById('leadCompany').value = '';
        document.getElementById('leadPhone').value = '';
    });
    document.getElementById('copyWechatBtn').addEventListener('click', () => {
        navigator.clipboard.writeText('N1308635859').then(() => alert('微信号已复制'));
    });

    // ========== AI 聊天（可前端直接调用大模型，也可后端代理，这里演示前端直接调用，需用户配置密钥） ==========
    let apiKey = localStorage.getItem('openai_api_key') || '';
    let apiBase = localStorage.getItem('openai_api_base') || 'https://api.openai.com/v1';
    let apiModel = localStorage.getItem('openai_model') || 'gpt-3.5-turbo';
    function updateApiStatus() {
        const statusSpan = document.getElementById('apiKeyStatus');
        if (apiKey) statusSpan.innerText = '✅ 已配置API密钥，将使用真实模型';
        else statusSpan.innerText = '⚙️ 未配置API密钥，使用演示模式';
    }
    document.getElementById('configApiBtn').addEventListener('click', () => {
        const newKey = prompt('请输入 OpenAI/DeepSeek API Key', apiKey);
        if (newKey !== null) {
            apiKey = newKey;
            localStorage.setItem('openai_api_key', apiKey);
            updateApiStatus();
        }
    });
    async function simulateReply(question) {
        const q = question.toLowerCase();
        if (q.includes('增值税')) return '增值税一般税率13%，小规模10万以下免税。';
        if (q.includes('所得税')) return '企业所得税标准25%，高新15%。';
        if (q.includes('研发')) return '研发费用可加计100%扣除。';
        return '这是演示回复。如需精准回答，请配置有效API密钥。';
    }
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const question = input.value.trim();
        if (!question) return;
        const chatDiv = document.getElementById('chatMessages');
        const userMsgDiv = document.createElement('div');
        userMsgDiv.className = 'message user';
        userMsgDiv.innerText = question;
        chatDiv.appendChild(userMsgDiv);
        input.value = '';
        chatDiv.scrollTop = chatDiv.scrollHeight;
        let reply = '';
        if (apiKey) {
            try {
                const response = await fetch(`${apiBase}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: apiModel, messages: [{ role: 'user', content: question }], temperature: 0.7 })
                });
                const data = await response.json();
                reply = data.choices[0].message.content;
            } catch (err) {
                reply = '调用AI失败，请检查API配置。';
            }
        } else {
            reply = await simulateReply(question);
        }
        const assistantMsgDiv = document.createElement('div');
        assistantMsgDiv.className = 'message assistant';
        assistantMsgDiv.innerText = reply;
        chatDiv.appendChild(assistantMsgDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
    document.getElementById('sendChatBtn').addEventListener('click', sendMessage);
    document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    updateApiStatus();
    renderGeneralPolicies();
    renderIndustryPolicies();
</script>
</body>
</html>
